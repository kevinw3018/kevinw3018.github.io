<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Adv-Single-Column-Layout</title>
        <link href="css/style.css" rel="stylesheet">
    </head>
    <body>
        <div class="light-container">
            <div class="single-column">
                <div class="section">
                    <h2> iPhone 17</h2>
                    <a href="#" class="button">
                        <a href="#" class="buttonborder">
                            View More
                        </a>
                        <p>
                            Get the highlights.
                        </p>
                        <img 
                            src="images/iphone3.jpg"
                            alt="orange iphone 17"
                            width="450px"
                        >
                </div>
            </div>
            <div class="dark-container">
                <div class="single-column">
                    <div class="section">
                        <h2> Even more delightful.</h2>
                        <h2>Even more durable.</h2>
                        <a href="#" class="buttonsimple">
                            View More
                        </a>
                        <p>
                            Meet the new iPhone 17. Built with contoured edges,
                            thinner boarders and durable materials.
                        </p>
                        <img 
                            src="images/iphone2.jpg"
                            alt="iphone 17"
                            width="450px"
                        >
                    </div>
                </div>
                <div class="med-container">
                    <div class="single-column">
                        <div class="section">
                            <h2> Camera.</h2>
                            <a href="#" class="simplebutton">
                                Simple Button
                            </a>
                            <p>
                                18MP center stage front camera.
                            </p>
                            <img 
                                src="images/iphone1.webp"
                                alt="orange iphone 17"
                                width="450px"
                            >
                        </div>
                    </div>
                    
    </body>
</html>
